services:
  app:
    build: .
    user: "0:0"
    environment:
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      MAX_WEBHOOK_SECRET: ${MAX_WEBHOOK_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/webhook/max}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./var/app.db}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./var:/app/var
    restart: unless-stopped
    expose:
      - "8080"

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: maxbot
      POSTGRES_USER: maxbot
      POSTGRES_PASSWORD: maxbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    profiles: ["postgres"]

volumes:
  pgdata: {}
  caddy_data: {}
  caddy_config: {}
